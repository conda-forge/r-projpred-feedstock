{% set version = "2.10.0" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-projpred
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/projpred_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/projpred/projpred_{{ version }}.tar.gz
  sha256: f404b1c0df634ab5821454386d379586c01047384d67d9227a22312655c59b47

build:
  number: 0
  rpaths:
    - lib/R/lib/
    - lib/
  missing_dso_whitelist:
    - '*/R.dll'           # [win]
    - '*/Rblas.dll'       # [win]
    - '*/Rlapack.dll'     # [win]

requirements:
  build:
    - cross-r-base {{ r_base }}    # [build_platform != target_platform]
    - r-abind                      # [build_platform != target_platform]
    - r-gamm4                      # [build_platform != target_platform]
    - r-ggplot2                    # [build_platform != target_platform]
    - r-gtools                     # [build_platform != target_platform]
    - r-lme4                       # [build_platform != target_platform]
    - r-loo                        # [build_platform != target_platform]
    - r-mass                       # [build_platform != target_platform]
    - r-mclogit                    # [build_platform != target_platform]
    - r-mgcv                       # [build_platform != target_platform]
    - r-mvtnorm                    # [build_platform != target_platform]
    - r-nnet                       # [build_platform != target_platform]
    - r-ordinal                    # [build_platform != target_platform]
    - r-rcpp                       # [build_platform != target_platform]
    - r-rcpparmadillo              # [build_platform != target_platform]
    - r-reformulas                 # [build_platform != target_platform]
    - r-rstantools                 # [build_platform != target_platform]
    - r-scales                     # [build_platform != target_platform]
    - {{ compiler('c') }}          # [not win]
    - {{ stdlib("c") }}            # [not win]
    - {{ compiler('m2w64_c') }}    # [win]
    - {{ stdlib("m2w64_c") }}      # [win]
    - {{ compiler('cxx') }}        # [not win]
    - {{ compiler('m2w64_cxx') }}  # [win]
    - {{ compiler("fortran") }}
    - {{ posix }}filesystem        # [win]
    - {{ posix }}make
    - {{ posix }}sed               # [win]
    - {{ posix }}coreutils         # [win]
    - {{ posix }}zip               # [win]
  host:
    - r-base
    - r-mass
    - r-rcpp
    - r-rcpparmadillo
    - r-abind
    - r-gamm4
    - r-ggplot2
    - r-gtools
    - r-lme4 >=1.1_28
    - r-loo >=2.0.0
    - r-mclogit
    - r-mgcv
    - r-mvtnorm
    - r-nnet
    - r-ordinal
    - r-reformulas
    - r-rstantools >=2.0.0
    - r-scales
    - libblas
    - liblapack
  run:
    - r-base
    - r-mass
    - r-rcpp
    - r-rcpparmadillo
    - r-abind
    - r-gamm4
    - r-ggplot2
    - r-gtools
    - r-lme4 >=1.1_28
    - r-loo >=2.0.0
    - r-mclogit
    - r-mgcv
    - r-mvtnorm
    - r-nnet
    - r-ordinal
    - r-reformulas
    - r-rstantools >=2.0.0
    - r-scales

test:
  commands:
    - $R -e "library('projpred')"           # [not win]
    - "\"%R%\" -e \"library('projpred')\""  # [win]

about:
  home: https://mc-stan.org/projpred/, https://discourse.mc-stan.org
  dev_url: https://github.com/stan-dev/projpred
  license: GPL-3.0-only
  summary: "Performs projection predictive feature selection for generalized linear models (Piironen,
    Paasiniemi, and Vehtari, 2020, <doi:10.1214/20-EJS1711>) with or without multilevel
    or additive terms (Catalina, B\xFCrkner, and Vehtari, 2022, <https://proceedings.mlr.press/v151/catalina22a.html>),
    for some ordinal and nominal regression models (Weber, Glass, and Vehtari, 2025,
    <doi:10.1007/s00180-024-01506-0>), and for many other regression models (using the
    latent projection by Catalina, B\xFCrkner, and Vehtari, 2021, <doi:10.48550/arXiv.2109.04702>,
    which can also be applied to most of the former models). The package is compatible
    with the 'rstanarm' and 'brms' packages, but other reference models can also be
    used. See the vignettes and the documentation for more information and examples."
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-3
    - LICENSE

extra:
  recipe-maintainers:
    - conda-forge/r
